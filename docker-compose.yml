version: '3.9'

services:
  backend:
    build: ./backend

    ports:
      - '5000:5000'

    volumes:
      - ./backend:/app
      - /app/node_modules

    env_file:
      - ./backend/.env

    depends_on:
      - mongo

  frontend:
    build: ./frontend

    ports:
      - '5173:5173'

    volumes:
      - ./frontend:/app
      - /app/node_modules

    depends_on:
      - backend

  mongo:
    image: mongo

    ports:
      - '27017:27017'

    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: